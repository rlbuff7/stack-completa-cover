document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: 0.15;\n    z-index: 0;\n    animation: float 10s ease-in-out infinite alternate;\n  }\n  .orb-1 { width: 50vw; height: 50vw; background: var(--blue); top: -20vh; left: -10vw; }\n  .orb-2 { width: 40vw; height: 40vw; background: var(--purple); bottom: -10vh; right: -10vw; animation-delay: -5s; }\n  .orb-3 { width: 30vw; height: 30vw; background: var(--green); top: 40%; left: 40%; opacity: 0.08; animation-delay: -2s; }\n\n  @keyframes float {\n    0% { transform: translate(0, 0) scale(1); }\n    100% { transform: translate(40px, -40px) scale(1.1); }\n  }\n\n  /* Glassmorphism utility */\n  .glass-panel {\n    background: var(--card-bg);\n    backdrop-filter: blur(16px);\n    -webkit-backdrop-filter: blur(16px);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);\n  }\n\n  /* Main container */\n  .container {\n    position: relative;\n    z-index: 1;\n    max-width: 1100px;\n    margin: 0 auto;\n    padding: 100px 24px;\n  }\n\n  /* Hero section */\n  .hero {\n    text-align: center;\n    margin-bottom: 100px;\n  }\n\n  .badge {\n    display: inline-block;\n    background: rgba(0,212,255,0.05);\n    border: 1px solid rgba(0,212,255,0.3);\n    color: var(--blue);\n    font-family: 'Space Mono', monospace;\n    font-size: 12px;\n    letter-spacing: 2px;\n    padding: 8px 20px;\n    border-radius: 100px;\n    text-transform: uppercase;\n    margin-bottom: 32px;\n    animation: fadeDown 0.8s ease both;\n    box-shadow: 0 0 20px rgba(0,212,255,0.1);\n  }\n\n  .hero-title {\n    font-size: clamp(48px, 8vw, 100px);\n    font-weight: 800;\n    line-height: 1.05;\n    letter-spacing: -2px;\n    margin-bottom: 24px;\n    animation: fadeDown 0.8s ease 0.1s both;\n  }\n\n  .hero-title .line-1 { display: block; color: var(--text-main); }\n  .hero-title .line-2 {\n    display: block;\n    background: linear-gradient(135deg, var(--blue), var(--green), var(--blue));\n    background-size: 200% auto;\n    -webkit-background-c 0,212,255,0.4);\n  }\n\n  /* Stats row */\n  .stats {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 1px;\n    background: var(--border);\n    padding: 1px;\n    margin-bottom: 100px;\n    animation: fadeUp 0.8s ease 0.5s both;\n  }\n\n  .stat {\n    background: var(--bg);\n    padding: 40px 24px;\n    text-align: center;\n    position: relative;\n  }\n\n  .stat::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent);\n    opacity: 0;\n    transition: opacity 0.3s;\n  }\n  .stat:hover::before { opacity: 1; }\n\n  .stat-num {\n    font-size: clamp(36px, 5vw, 48px);\n    margin-bottom: 8px;\n    position: relative;\n    z-index: 1;\n  }\n  .stat-num.blue   { color: var(--blue); text-shadow: 0 0 20px rgba(0,212,255,0.4); }\n  .stat-num.green  { color: var(--green); text-shadow: 0 0 20px rgba(0,255,136,0.4); }\n  .stat-num.yellow { color: var(--yellow); text-shadow: 0 0 20px rgba(247,201,72,0.4); }\n  .stat-num.purple { color: var(--purple); text-shadow: 0 0 20px rgba(168,85,247,0.4); }\n\n  .stat-label {\n    font-family: 'Space Mono', monospace;\n    font-size: 12px;\n    color: var(--text-muted);\n    letter-spacing: 1px;\n    text-transform: uppercase;\n    position: relative;\n    z-index: 1;\n  }\n\n  /* Headers gerais */\n  .section-title {\n    font-family: 'Space Mono', monospace;\n    font-size: 14px;\n    color: var(--blue);\n    letter-spacing: 3px;\n    text-transform: uppercase;\n    margin-bottom: 40px;\n    display: flex;\n    align-items: center;\n    gap: 16px;\n  }\n  .section-title::after {\n    content: '';\n    flex: 1;\n    height: 1px;\n    background: linear-gradient(90deg, var(--border), transparent);\n  }\n\n  /* Pipeline section */\n  .pipeline {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    margin-bottom: 100px;\n    animation: fadeUp 0.8s ease 0.6s both;\n  }\n\n  .pipeline-node {\n  48px;\n    height: 48px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    border-radius: 12px;\n    flex-shrink: 0;\n  }\n\n  .chapter-title {\n    font-family: 'Syne', sans-serif;\n    font-weight: 700;\n    font-size: 18px;\n    margin-bottom: 8px;\n    color: var(--text-main);\n  }\n\n  .chapter-desc {\n    font-size: 14px;\n    color: var(--text-muted);\n  }\n\n  /* For whom section */\n  .audience {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));\n    gap: 24px;\n    margin-bottom: 100px;\n    animation: fadeUp 0.8s ease 0.8s both;\n  }\n\n  .audience-card {\n    padding: 32px;\n    transition: all 0.3s ease;\n    text-align: left;\n  }\n\n  .audience-card:hover {\n    border-color: rgba(0,255,136,0.3);\n    box-shadow: 0 10px 30px rgba(0,255,136,0.05);\n    transform: translateY(-5px);\n  }\n\n  .audience-icon {\n    font-size: 40px;\n    margin-bottom: 24px;\n    display: block;\n  }\n\n  .audience-title {\n    font-family: 'Syne', sans-serif;\n    font-weight: 700;\n    font-size: 20px;\n    margin-bottom: 12px;\n  }\n\n  .audience-desc {\n    font-size: 15px;\n    color: var(--text-muted);\n  }\n\n  /* Footer CTA */\n  .footer-cta {\n    text-align: center;\n    padding: 80px 0 40px;\n    animation: fadeUp 0.8s ease 0.9s both;\n    position: relative;\n  }\n\n  .footer-cta::before {\n    content: '';\n    position: absolute;\n    top: 0; left: 20%; right: 20%;\n    height: 1px;\n    background: linear-gradient(90deg, transparent, var(--blue), transparent);\n    opacity: 0.3;\n  }\n\n  .footer-cta p {\n    font-size: 14px;\n    color: var(--text-muted);\n    font-family: 'Space Mono', monospace;\n    margin-bottom: 32px;\n    text-transform: uppercase;\n    letter-spacing: 2px;\n  }\n\n  /* Animations */\n  @keyframes fadeDown {\n    from { opacity: 0; transform: translateY(-30px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(30px); }\n    to   { opacity: 1; transform: translateY(0); }\n  }\n\n  /* Responsividade Mobile Aperfeiçoada */\n  @media (max-width: 768px) {\n    .container { padding: 60px 20px; }\n\n    .stats { grid-template-columns: repeat(2, 1fr); margin-bottom: 60px; }\n\n    /* Pipeline vira vertical no mobile para não espremer */\n    .pipeline {\n      flex-direction: column;\n      align-items: stretch;\n      gap: 10px;\n    }\n    .pipeline-arrow {\n      transform: rotate(90deg);\n      text-align: center;\n      margin: 10px 0;\n      animation: pulseArrowDown 2s infinite;\n    }\n\n    @keyframes pulseArrowDown {\n      0%, 100% { opacity: 0.3; transform: rotate(90deg) translateY(0); }\n      50% { opacity: 1; transform: rotate(90deg) translateY(-5px); color: var(--blue); }\n    }\n  }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<div class=\"orb orb-1\"><\u002Fdiv>\n<div class=\"orb orb-2\"><\u002Fdiv>\n<div class=\"orb orb-3\"><\u002Fdiv>\n\n<div class=\"container\">\n\n  <div class=\"hero\">\n    <div class=\"badge\">v1.0 · Lançamento 2026<\u002Fdiv>\n    <h1 class=\"hero-title\">\n      <span class=\"line-1\">Do Zero<\u002Fspan>\n      <span class=\"line-2\">ao Deploy<\u002Fspan>\n    <\u002Fh1>\n    <p class=\"hero-sub\">\n      <strong>Python · Node.js · Docker · IA em Produção<\u002Fstrong><br>\n      O guia definitivo com a arquitetura que as empresas realmente usam. Do zero ao deploy na AWS EC2, construindo microsserviços do jeito certo.\n    <\u002Fp>\n    <div class=\"tech-pills\">\n      <span class=\"pill node\">Node.js / NestJS<\u002Fspan>\n      <span class=\"pill python\">Python / Pandas<\u002Fspan>\n      <span class=\"pill node\">PostgreSQL / MongoDB<\u002Fspan>\n      <span class=\"pill docker\">RabbitMQ<\u002Fspan>\n      <span class=\"pill python\">Claude IA (RAG)<\u002Fspan>\n      <span class=\"pill docker\">Docker<\u002Fspan>\n      <span class=\"pill aws\">AWS EC2<\u002Fspan>\n      <span class=\"pill\">GitHub Actions<\u002Fspan>\n    <\u002Fdiv>\n    <a href=\"javascript:void(0)\" class=\"cta-btn\"><span>→ Dominar a Stack<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n\n  <div class=\"stats glass-panel\">\n    <div class=\"stat\">\n      <div class=\"stat-num blue\">10<\u002Fdiv>\n      <div class=\"stat-label\">Capítulos<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"stat-num green\">100%<\u002Fdiv>\n      <div class=\"stat-label\">Prático<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"stat-num yellow\">01<\u002Fdiv>\n      <div class=\"stat-label\">Projeto Final<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat\">\n      <div class=\"stat-num purple\">15+<\u002Fdiv>\n      <div class=\"stat-label\">Tecnologias<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section-title\">A Arquitetura que você vai construir<\u002Fdiv>\n  <div class=\"pipeline\">\n    <div class=\"pipeline-node glass-panel\">\n      <span class=\"node-icon\">📥<\u002Fspan>\n      <div class=\"node-name\">Upload API<\u002Fdiv>\n      <div class=\"node-tech\">NestJS + JWT<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pipeline-arrow\">→<\u002Fdiv>\n    <div class=\"pipeline-node glass-panel\">\n      <span class=\"node-icon\">🐰<\u002Fspan>\n      <div class=\"node-name\">Mensageria<\u002Fdiv>\n      <div class=\"node-tech\">RabbitMQ<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pipeline-arrow\">→<\u002Fdiv>\n    <div class=\"pipeline-node glass-panel\">\n      <span class=\"node-icon\">🐍<\u002Fspan>\n      <div class=\"node-name\">Worker ETL<\u002Fdiv>\n      <div class=\"node-tech\">Python + Pandas<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pipeline-arrow\">→<\u002Fdiv>\n    <div class=\"pipeline-node glass-panel\">\n      <span class=\"node-icon\">🐘<\u002Fspan>\n      <div class=\"node-name\">Database<\u002Fdiv>\n      <div class=\"node-tech\">PostgreSQL<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pipeline-arrow\">→<\u002Fdiv>\n    <div class=\"pipeline-node glass-panel\">\n      <span class=\"node-icon\">🤖<\u002Fspan>\n      <div class=\"node-name\">Insights<\u002Fdiv>\n      <div class=\"node-tech\">Claude IA<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div id=\"capitulos\" class=\"section-title\">A Trilha Completa<\u002Fdiv>\n  <div class=\"chapters\">\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">01<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Configurando o Ambiente<\u002Fdiv>\n        <div class=\"chapter-desc\">A base sênior: WSL2, Node.js, Python, VS Code otimizado e Claude Code integrado.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">02<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Docker sem Desktop<\u002Fdiv>\n        <div class=\"chapter-desc\">Containers performáticos, Docker Compose, mapeamento de volumes e redes seguras.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">03<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Arquitetura de Bancos<\u002Fdiv>\n        <div class=\"chapter-desc\">PostgreSQL (Relacional) vs MongoDB (NoSQL) — e exatamente quando usar cada um.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">04<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">APIs com NestJS<\u002Fdiv>\n        <div class=\"chapter-desc\">Construindo endpoints REST robustos e integrando com APIs externas (Notion/Metabase).<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">05<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Mensageria com RabbitMQ<\u002Fdiv>\n        <div class=\"chapter-desc\">Saindo do processamento síncrono: Work queues, ack manual e resiliência em falhas.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">06<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">IA do Jeito Certo<\u002Fdiv>\n        <div class=\"chapter-desc\">Tool Calling, RAG com pgvector, controle de custos (FinOps) e abstração de modelos.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">07<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">CI/CD com GitHub Actions<\u002Fdiv>\n        <div class=\"chapter-desc\">Estratégia de branches, lint-staged, armadilhas de lockfile e deploy automatizado.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">08<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Deploy na AWS EC2<\u002Fdiv>\n        <div class=\"chapter-desc\">Servidor do zero: Nginx como Proxy Reverso, HTTPS com Let's Encrypt, Swap e SSH.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">09<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Segurança e Testes<\u002Fdiv>\n        <div class=\"chapter-desc\">Autenticação com JWT, hash de senhas com bcrypt, testes unitários e E2E no Jest.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chapter-card glass-panel\">\n      <span class=\"chapter-num\">10<\u002Fspan>\n      <div class=\"chapter-info\">\n        <div class=\"chapter-title\">Projeto Final: Produção<\u002Fdiv>\n        <div class=\"chapter-desc\">Unindo a stack: API em Node.js emitindo eventos para um Worker ETL pesado em Python.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"section-title\">Para quem é este material<\u002Fdiv>\n  <div class=\"audience\">\n    <div class=\"audience-card glass-panel\">\n      <span class=\"audience-icon\">👨‍💻<\u002Fspan>\n      <div class=\"audience-title\">Dev Júnior / Pleno<\u002Fdiv>\n      <div class=\"audience-desc\">Sabe programar, mas nunca subiu infraestrutura real na AWS ou conectou serviços via RabbitMQ.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"audience-card glass-panel\">\n      <span class=\"audience-icon\">🎓<\u002Fspan>\n      <div class=\"audience-title\">Estudantes e Transição<\u002Fdiv>\n      <div class=\"audience-desc\">Quer fugir dos tutoriais básicos de \"ToDo List\" e construir um portfólio que impressione recrutadores.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footer-cta\">\n    <p>O mercado cobra experiência. Nós ensinamos a arquitetura.<\u002Fp>\n    <a href=\"javascript:void(0)\" class=\"cta-btn\"><span>Quero garantir meu acesso<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n\n\n<\u002Fbody><\u002Fhtml>"
